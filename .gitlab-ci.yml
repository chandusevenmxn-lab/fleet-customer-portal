stages:
  - build
  - deploy

variables:
  # Use GitLab's built-in container registry
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

# Build stage: Build the Docker image and push it to GitLab Registry
build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  only:
    - main
    - master

# Deploy stage: Pull the image on your server and run it
# Note: You need to set up SSH keys in GitLab CI/CD Variables
deploy_to_server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # Skip host key checking for simplicity in this example (or add to known_hosts)
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        docker pull $DOCKER_IMAGE &&
        docker stop fleet-app || true &&
        docker rm fleet-app || true &&
        docker run -d --name fleet-app -p 80:80 $DOCKER_IMAGE"
  only:
    - main
    - master
  environment:
    name: production
    url: http://$DEPLOY_HOST
