stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG
  DOCKER_IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_REF_SLUG

lint_and_test:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npm run lint
  only:
    - main
    - master

build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE_FRONTEND .
    - docker build -t $DOCKER_IMAGE_BACKEND ./server
    - docker push $DOCKER_IMAGE_FRONTEND
    - docker push $DOCKER_IMAGE_BACKEND
  only:
    - main
    - master

deploy_to_server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
  script:
    # Copy configuration files to the server
    - scp docker-compose.yml init.sql $DEPLOY_USER@$DEPLOY_HOST:/home/$DEPLOY_USER/
    # Log in and restart services using Docker Compose
    - ssh $DEPLOY_USER@$DEPLOY_HOST "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export FRONTEND_IMAGE=$DOCKER_IMAGE_FRONTEND &&
        export BACKEND_IMAGE=$DOCKER_IMAGE_BACKEND &&
        docker-compose down || true &&
        docker-compose up -d"
  only:
    - main
    - master
