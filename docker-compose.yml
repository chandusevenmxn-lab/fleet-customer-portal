version: '3.8'

services:
  # Frontend App
  fleet-app:
    build: .
    ports:
      - "80:80"
    depends_on:
      - api

  # Backend API
  api:
    build: ./server
    environment:
      - DB_USER=fleet_user
      - DB_PASSWORD=fleet_password
      - DB_NAME=fleet_db
      - DB_HOST=db
    depends_on:
      - db

  # Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
